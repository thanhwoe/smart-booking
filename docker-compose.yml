services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: smart-booking-api
    environment:
      - PORT=${PORT}
    ports:
      - '${PORT}:${PORT}'
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    networks:
      - smart-booking-net
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:${PORT:-3000}/api/v1/health/live']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: smart-booking-redis
    ports:
      - '${REDIS_PORT}:${REDIS_PORT}'
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - smart-booking-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  postgres_test:
    image: postgres:16-alpine
    container_name: smart-booking-postgres-test
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=smart_booking_test
    ports:
      - '5433:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - smart-booking-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  smart-booking-net:
    driver: bridge

volumes:
  redis_data:
  postgres_test_data:
