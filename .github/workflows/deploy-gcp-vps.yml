name: Deploy GCP VPS Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: deploy-gcp-vps-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GCP VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/200926886242/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-deploy@project-7144a0e1-eaa5-4a10-a51.iam.gserviceaccount.com'
          token_format: access_token

      - name: Configure Docker for GCR
        uses: docker/login-action@v3
        with:
          registry: asia-southeast1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push Docker image
        env:
          IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/smart-booking/app
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker build --target production \
            -t $IMAGE:$SHA \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:$SHA
          docker push $IMAGE:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/smart-booking/app
          SHA: ${{ github.event.workflow_run.head_sha }}
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE,SHA,ACCESS_TOKEN
          script: |
            echo $ACCESS_TOKEN | docker login \
              -u oauth2accesstoken \
              --password-stdin \
              asia-southeast1-docker.pkg.dev

            docker pull $IMAGE:$SHA

            docker stop smart-booking || true
            docker rm smart-booking || true

            docker run -d \
              --name smart-booking \
              --network smart-booking-net \
              --restart unless-stopped \
              --env-file /home/$USER/.env.production \
              $IMAGE:$SHA

            docker exec smart-booking \
              node_modules/.bin/prisma migrate deploy

            docker image prune -f

      - name: Copy Nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'nginx/nginx.conf'
          target: '/home/${{ secrets.VPS_USER }}/'
          strip_components: 1

      - name: Restart Nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker inspect smart-booking-nginx >/dev/null 2>&1 \
              || docker run -d \
                  --name smart-booking-nginx \
                  --network smart-booking-net \
                  --restart unless-stopped \
                  -p 80:80 \
                  -v /home/${{ secrets.VPS_USER }}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
                  nginx:alpine

            docker exec smart-booking-nginx nginx -s reload

      - name: Health check
        run: |
          sleep 15
          curl -fsS http://${{ secrets.VPS_HOST }}/api/v1/health/live \
            || (echo "Health check failed!" && exit 1)
