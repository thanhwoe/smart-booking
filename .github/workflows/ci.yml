name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Setup Yarn
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma Client
        run: yarn db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_booking_test

      - name: Lint
        run: yarn lint:check

      - name: Typecheck
        run: yarn typecheck

      - name: Build
        run: yarn build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_booking_test

      - name: Unit tests
        run: yarn test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_booking_test
          PORT: '3001'
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          CLERK_PUBLISHABLE_KEY: pk_test_fake
          CLERK_SECRET_KEY: sk_test_fake
          CLERK_WEBHOOK_SECRET: whsec_fake
          POST_HOG_TOKEN: phc_fake
          LOCK_RETRY_COUNT: '3'
          LOCK_RETRY_DELAY: '200'
          LOCK_DEFAULT_TTL: '5000'
          RESEND_API_KEY: re_fake
          RESEND_FROM_EMAIL: test@test.com
          RESEND_WEBHOOK_SECRET: whsec_fake
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_fake

      - name: Docker build validation
        run: docker build --target production .
