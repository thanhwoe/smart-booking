name: Deploy Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Railway Production
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Setup Yarn
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4

      - name: Build and deploy Docker image
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRODUCTION }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
        run: |
          doppler run \
            --project "${{ vars.DOPPLER_PROJECT || 'smart-booking' }}" \
            --config production \
            -- \
            railway up \
              --service "${{ secrets.RAILWAY_SERVICE_ID_PRODUCTION }}" \
              --environment "${{ vars.RAILWAY_ENVIRONMENT_PRODUCTION || 'production' }}" \
              --detach

      - name: Run Prisma migrations
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRODUCTION }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
        run: |
          doppler run \
            --project "${{ vars.DOPPLER_PROJECT || 'smart-booking' }}" \
            --config production \
            -- \
            railway run \
              --service "${{ secrets.RAILWAY_SERVICE_ID_PRODUCTION }}" \
              --environment "${{ vars.RAILWAY_ENVIRONMENT_PRODUCTION || 'production' }}" \
              -- yarn prisma migrate deploy
