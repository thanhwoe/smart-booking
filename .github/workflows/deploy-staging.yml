name: Deploy Staging

on:
  push:
    branches:
      - develop

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Railway Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Setup Yarn
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4

      - name: Build and deploy Docker image
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STAGING }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          doppler run \
            --project "${{ vars.DOPPLER_PROJECT || 'smart-booking' }}" \
            --config staging \
            -- \
            railway up \
              --service "${{ secrets.RAILWAY_SERVICE_ID_STAGING }}" \
              --environment "${{ vars.RAILWAY_ENVIRONMENT_STAGING || 'staging' }}" \
              --detach

      - name: Run Prisma migrations
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STAGING }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          doppler run \
            --project "${{ vars.DOPPLER_PROJECT || 'smart-booking' }}" \
            --config staging \
            -- \
            railway run \
              --service "${{ secrets.RAILWAY_SERVICE_ID_STAGING }}" \
              --environment "${{ vars.RAILWAY_ENVIRONMENT_STAGING || 'staging' }}" \
              -- yarn prisma migrate deploy
